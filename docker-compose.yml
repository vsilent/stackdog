version: '3'
volumes:
    db:
      driver: local
services:
  stackdog:
    container_name: stackdog
#    image: trydirect/stackdog:latest
    build:
      context: .
      dockerfile: docker/local/Dockerfile
    #entrypoint: [ 'bash', '-c', 'sleep infinity' ]
    entrypoint: ['/app/stackdog']
#    restart: always
    ports:
    - "5003:5000"
    env_file: .env
    volumes:
      - db:/app/db
      - ./.env:/app/.env:r
    environment:
      - RUST_LOG=debug
      - RUST_BACKTRACE=1